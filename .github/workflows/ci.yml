name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  test-unit:
    name: Unit and API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test

      - name: Run Vitest
        run: npm run test:unit -- --reporter=verbose
        env:
          AUTH_SECRET: ci-secret-placeholder-32-chars-long
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bodyops_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test

      - name: Run DB migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test
          AUTH_SECRET: ci-secret-placeholder-32-chars-long
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-google-client-id-placeholder
          GOOGLE_CLIENT_SECRET: ci-google-client-secret-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test
          AUTH_SECRET: ci-secret-placeholder-32-chars-long
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-google-client-id-placeholder
          GOOGLE_CLIENT_SECRET: ci-google-client-secret-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test
          AUTH_SECRET: ci-secret-placeholder-32-chars-long
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-google-client-id-placeholder
          GOOGLE_CLIENT_SECRET: ci-google-client-secret-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
