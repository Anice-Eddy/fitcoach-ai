name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DATABASE_URL: postgresql://test:test@localhost:5432/bodyops_test
  AUTH_SECRET: ci-secret-placeholder-32-chars-long
  AUTH_PROVIDER: firebase
  NEXT_PUBLIC_AUTH_PROVIDER: firebase
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-firebase-api-key
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: bodyops-ci.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: bodyops-ci
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: bodyops-ci.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '123456789'
  NEXT_PUBLIC_FIREBASE_APP_ID: '1:123456789:web:ci'
  AUTH_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  STRIPE_SECRET_KEY: sk_test_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_placeholder

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: TypeScript check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: i18n audit
        run: npm run i18n:audit:fail

  test-unit:
    name: Unit and API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Vitest
        run: npm run test:unit -- --reporter=verbose

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bodyops_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test-unit]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

  release:
    name: Create semantic release
    needs: [lint-typecheck, test-unit, test-e2e, build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_sha: ${{ steps.release-ref.outputs.release_sha }}
    env:
      DATABASE_URL: postgresql://release:release@localhost:5432/bodyops_release

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Resolve released ref
        id: release-ref
        run: |
          git fetch origin main --depth=1
          echo "release_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

  migrate:
    name: Migrate production database
    needs: release
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: Prod
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Check production database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing GitHub secret: PRODUCTION_DATABASE_URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Show migration status
        run: npx prisma migrate status
        continue-on-error: true

      - name: Apply pending migrations
        run: npm run db:migrate:deploy

      - name: Confirm migration status
        run: npx prisma migrate status

  deploy:
    name: Deploy Vercel production
    needs: [release, migrate]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: Prod
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Check Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one of the required GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: List Vercel production environment names
        run: vercel env ls production --token "$VERCEL_TOKEN"

      - name: Deploy Vercel production
        run: vercel deploy --prod --token "$VERCEL_TOKEN"
